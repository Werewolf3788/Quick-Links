    <style>
        /* ========================================================================
        CSS STYLES - UNIVERSAL STANDARDS
        ======================================================================= */
        :root {
            --primary-bg: #111827;
            --secondary-bg: #0b0f19;
            --text-color: #f3f4f6;
            --header-size: 30px;
            --body-size: 14px;
            --section-height: 50px;
            --row-height: 30px;
            /* Accent color is dynamically updated per grouping */
            --current-accent: #00d4ff;
            
            /* Card slot calculation: 327px (user) + margins/gap */
            --card-width-base: 327px;
            
            /* Dynamic Theme Variables (Injected by JS) */
            --theme-card-gradient: linear-gradient(145deg, #1f2937 0%, #111827 100%);
        }

        * {
            box-sizing: border-box;
            overflow-wrap: break-word; /* Applied globally per mobile standards */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: var(--body-size); /* Standard 14px */
            line-height: 1.5;
            margin: 0;
            padding: 0;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            transition: background-color 0.5s ease;
        }

        /* NAVIGATION & HEADER - 3 COLUMN LAYOUT (WEATHER | BRANDING | WEATHER) */
        header {
            background-color: #0b0f19;
            color: #fff;
            padding: 10px 1%;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;

            top: 0;

            min-height: 80px;

        /* WEATHER BLOCKS */
        .weather-block {
            font-size: 0.75rem;

            display: flex;
            flex-direction: column;
        }

        .weather-block.left { text-align: left; }
        .weather-block.right { text-align: right; }

        .weather-city {
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .weather-info {
            font-size: 0.8rem;
            color: #e5e7eb;
        }

        .weather-time {
            color: #00d4ff;
            font-weight: 500;
        }

        /* CENTER BRANDING */
        .header-branding {
            display: flex;
            flex-direction: column;
            text-align: center;
            padding: 0 20px;
        }

        .logo {
            font-weight: bold;

        }

        }

        /* MOBILE MENU (SANDWICH) */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;

            margin-left: 10px;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background-color: white;
            margin: 2px 0;
        }

        /* LAYOUT & CONTAINERS - EXPANDED WIDTH (98%) & CONDITIONAL FLEX */
        .container {
            width: 98%;
            max-width: 98%;
            margin: 0 auto;
            padding: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: stretch; /* Stretching ensures rows look balanced */
        }

        /* GROUP SECTION LOGIC - VERSION 1.1.7 */
        .group-section {
            padding: 25px;
            border-radius: 12px;
            transition: background-color 0.3s ease;
            display: flex;
            flex-direction: column;
            /* Glossy inner light shadow on the top edge of the group container */

            margin-bottom: 20px;

            min-width: 350px;

        h2.group-title {

        .card-grid {
            display: grid;
            /* Using user-provided 327px as the minimum slot size */
            grid-template-columns: repeat(auto-fill, minmax(var(--card-width-base), 1fr));
            gap: 20px;
            height: 100%;

        /* CARD STYLING - GLOSSY FINISH (V1.2.5 Modals Adjustment) */
        .card {
            background: var(--theme-card-gradient);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            border-radius: 8px;
            /* Inner top white highlight for glass edge + soft drop shadow */

            padding: 20px;
            display: flex;
            flex-direction: column;

            border-top: 4px solid var(--current-accent);
            min-height: 247px; /* Matches user provided height */
            position: relative;
            overflow: hidden; /* Contains the hover shine */
            cursor: pointer; /* Indicated whole card box is interactive */
        }

        /* Ambient translucent layer targeting dark visibility readability when images load */
        .card.has-bg-img {
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* The Glossy Light Sweep Animation */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 60%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0) 100%);

        .card:hover::before {
            left: 200%; /* Sweeps the light reflection across the card */

        }

            color: #0b0f19;

            font-weight: bold;

            border-radius: 6px;

            text-transform: uppercase;

        }

        .lightbox-action-btn:hover {
            background: #ffffff;
            color: #0b0f19;
            box-shadow: 0 0 20px #ffffff;

        .close-lightbox {
            position: absolute;

        .kf-signature {

        /* MOBILE RESPONSIVE STYLES (14/30 standards) */
        @media (max-width: 768px) {

        }

        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

    <script>
        /* ========================================================================
        JAVASCRIPT - DATA FETCHING & UI LOGIC
        ======================================================================= */

        const VERSION = "1.2.5";
        
        // Persistent global register mapping window pointer references
        const activeTabsMap = {};
        
        /**
         * Dynamic Time-Of-Day Theme Engine
         * Switches background color profiles automatically based on actual hours elapsed
         */
        function applyTimeBasedTheme() {
            const currentHour = new Date().getHours();
            let pageBg = "#0b0f19";
            let cardGradient = "linear-gradient(145deg, #1f2937 0%, #111827 100%)";
            
            if (currentHour >= 5 && currentHour < 8) {
                pageBg = "#0f0e17";
                cardGradient = "linear-gradient(145deg, #2e1b4b 0%, #1e1b4b 100%)";
            } else if (currentHour >= 8 && currentHour < 17) {
                pageBg = "#0b0f19";
                cardGradient = "linear-gradient(145deg, #1f2937 0%, #111827 100%)";
            } else if (currentHour >= 17 && currentHour < 20) {
                pageBg = "#130f26";
                cardGradient = "linear-gradient(145deg, #3b1154 0%, #210b36 100%)";
            } else {
                pageBg = "#030712";
                cardGradient = "linear-gradient(145deg, #111827 0%, #030712 100%)";
            }
            
            document.body.style.backgroundColor = pageBg;
            document.documentElement.style.setProperty('--secondary-bg', pageBg);
            document.documentElement.style.setProperty('--theme-card-gradient', cardGradient);
        }

        function getCacheBuster() {
            return `&cb=${new Date().getTime()}`;
        }

        function getCSVUrl() {
            return 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQMb5Z2qGYtJLqx5dwnDKUdlLcCEcgGHKe_elqxIy-NvsWbDKtYgJAFeSXKGmSIxdBPfzFtFZt4HzV-/pub?output=csv' + getCacheBuster();
        }

        const COLOR_PALETTE = [
            ['rgba(30, 41, 59, 0.45)', '#38bdf8'], ['rgba(15, 43, 36, 0.45)', '#4ade80'], ['rgba(69, 26, 26, 0.45)', '#f87171'],
            ['rgba(4e, 29, 74, 0.45)', '#c084fc'], ['rgba(67, 30, 12, 0.45)', '#fb923c'], ['rgba(13, 47, 49, 0.45)', '#2dd4bf']
        ];

        function getWeatherDesc(code) {
            const mapping = {
                0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
                45: "Fog", 48: "Depositing Rime Fog", 51: "Light Drizzle", 61: "Slight Rain",
                71: "Slight Snow", 95: "Thunderstorm"
            };
            return mapping[code] || "Conditions Vary";
        }

        async function updateWeatherAndTime() {
            const locations = [
                { id: 'flora', lat: 38.67, lon: -88.49, tz: 'America/Chicago' },
                { id: 'gainesville', lat: 29.65, lon: -82.32, tz: 'America/New_York' }
            ];

            locations.forEach(async (loc) => {
                const el = document.getElementById(`weather-${loc.id}`);
                if (!el) return;
                const now = new Date();
                const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: loc.tz });
                const zoneStr = now.toLocaleTimeString('en-US', { timeZoneName: 'short', timeZone: loc.tz }).split(' ').pop();
                el.querySelector('.weather-time').textContent = `${timeStr} ${zoneStr}`;

                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code&temperature_unit=fahrenheit`);
                    const data = await res.json();
                    const temp = Math.round(data.current.temperature_2m);
                    const realFeel = Math.round(data.current.apparent_temperature);
                    const humidity = data.current.relative_humidity_2m;
                    const desc = getWeatherDesc(data.current.weather_code);
                    el.querySelector('.weather-info').innerHTML = `${temp}°F (Feels ${realFeel}°F)<br>${humidity}% Humidity • ${desc}`;
                } catch (e) { el.querySelector('.weather-info').textContent = "Weather N/A"; }
            });
        }

        function toggleMenu() { console.log("Mobile menu interaction."); }

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const next = text[i+1];
                if (inQuotes) {
                    if (char === '"' && next === '"') { field += '"'; i++; }
                    else if (char === '"') { inQuotes = false; }
                    else { field += char; }
                } else {
                    if (char === '"') { inQuotes = true; }
                    else if (char === ',') { row.push(field); field = ''; }
                    else if (char === '\n' || char === '\r') {
                        row.push(field);
                        if (row.some(f => f.trim() !== "")) rows.push(row);
                        row = []; field = '';
                        if (char === '\r' && next === '\n') i++;
                    } else { field += char; }
                }
            }
            if (field || row.length > 0) { row.push(field); rows.push(row); }
            return rows;
        }

        async function loadCards() {
            try {
                applyTimeBasedTheme();
                const response = await fetch(getCSVUrl());
                if (!response.ok) throw new Error('Network response not ok');
                const data = await response.text();
                const rows = parseCSV(data);
                rows.shift(); // Remove Headers
                const groups = {};
                rows.forEach(row => {
                    const name = (row[0] || "").trim();
                    if (!name) return;
                    const desc = (row[1] || "").trim();
                    const groupName = (row[2] || "").trim() || 'General';
                    const url = (row[3] || "").trim() || '#';
                    const imgUrl = (row[4] || "").trim(); 
                    if (!groups[groupName]) groups[groupName] = [];
                    groups[groupName].push({ name, description: desc, group: groupName, url, imageUrl: imgUrl });
                });
                renderCards(groups);
            } catch (error) { 
                console.error("CSV load error:", error);
                document.getElementById('content-area').innerHTML = `<p>Error loading spreadsheet links. Retrying in 5 mins...</p>`; 
            }
        }

        /**
         * Advanced Inter-Tab Navigation Routing Handler
         */
        window.executeSmartTabFocus = function(event, uniqueTargetId, destinationUrl, linkName, structuralGroup) {
            if (event) event.preventDefault(); 
            
            trackLinkClick(linkName, structuralGroup, destinationUrl);

            if (activeTabsMap[uniqueTargetId] && !activeTabsMap[uniqueTargetId].closed) {
                activeTabsMap[uniqueTargetId].location.href = destinationUrl;
                activeTabsMap[uniqueTargetId].focus(); 
            } else {
                activeTabsMap[uniqueTargetId] = window.open(destinationUrl, uniqueTargetId);
            }
        };

        /**
         * Comprehensive Multi-Asset Card Lightbox Opener
         * Assembles the complete layout overview including full background images and buttons seamlessly
         */
        window.openAdvancedCardLightbox = function(title, description, imageUrl, uniqueTargetId, destinationUrl, groupName) {
            const overlay = document.getElementById('lightbox-overlay');
            const titleEl = document.getElementById('lightbox-text-title');
            const mediaAnchor = document.getElementById('lightbox-media-anchor');
            const bodyEl = document.getElementById('lightbox-text-body');
            const actionAnchor = document.getElementById('lightbox-action-anchor');

            titleEl.textContent = title;
            bodyEl.innerHTML = description;

            // Handle image rendering inside lightbox frame
            if (imageUrl && imageUrl.startsWith('http')) {
                mediaAnchor.innerHTML = `<img src="${imageUrl}" class="lightbox-media-preview" alt="${title}">`;
            } else {
                mediaAnchor.innerHTML = '';
            }

            // Generate clean execution call variables for the action link inside lightbox layout
            const escUrl = destinationUrl.replace(/'/g, "\\'");
            const escName = title.replace(/'/g, "\\'");
            const escGroup = groupName.replace(/'/g, "\\'");

            actionAnchor.innerHTML = `
                <a class="lightbox-action-btn" onclick="executeSmartTabFocus(event, '${uniqueTargetId}', '${escUrl}', '${escName}', '${escGroup}')">
                    Open Resource Link
                </a>
            `;

            overlay.style.display = 'flex';
        };

        /**
         * Grid Rendering with SMART FLEX LOGIC & Full Card Lightbox Injections
         */
        function renderCards(groups) {
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            const sortedGroups = Object.keys(groups).sort();
            
            const SLOT_WIDTH = 347; 

            sortedGroups.forEach((group, index) => {
                const colorPair = COLOR_PALETTE[index % COLOR_PALETTE.length];
                const section = document.createElement('section');
                const itemCount = groups[group].length;
                const dynamicBasis = itemCount * SLOT_WIDTH;
                
                section.className = `group-section`;
                section.style.backgroundColor = colorPair[0];
                section.style.setProperty('--current-accent', colorPair[1]);
                
                if (window.innerWidth > 768) {
                    section.style.flexBasis = `${dynamicBasis}px`;
                    if (itemCount >= 6) {
                        section.style.flexBasis = "100%";
                    }
                }

                section.innerHTML = `<h2 class="group-title">${group}</h2>`;
                const grid = document.createElement('div');
                grid.className = 'card-grid';

                groups[group].forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    let finalUrl = item.url;
                    
                    if (item.url.match(/^[0-9]+ .+, .+/)) {
                        finalUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.url)}`;
                    }

                    if (finalUrl !== '#' && !finalUrl.includes('utm_source=')) {
                        const separator = finalUrl.includes('?') ? '&' : '?';
                        finalUrl = `${finalUrl}${separator}utm_source=quicklinks_dashboard&utm_medium=card_click&utm_campaign=internal_utility`;
                    }

                    const cleanDesc = item.description.replace(/\n/g, "<br>");
                    const targetTabWindowId = `tab_${item.name.replace(/[^a-zA-Z0-9]/g, '_')}`;

                    if (item.imageUrl && item.imageUrl.startsWith('http')) {
                        card.classList.add('has-bg-img');
                        card.style.backgroundImage = `linear-gradient(135deg, rgba(15, 23, 42, 0.55) 0%, rgba(15, 23, 42, 0.85) 100%), url('${item.imageUrl}')`;
                    } else {
                        card.style.backgroundImage = `linear-gradient(145deg, var(--theme-card-gradient) 0%, rgba(0,0,0,0.2) 100%)`;
                    }

                    const cleanItemName = item.name.replace(/'/g, "\\'");
                    const cleanGroupName = group.replace(/'/g, "\\'");
                    const cleanFinalUrl = finalUrl.replace(/'/g, "\\'");
                    const cleanImgUrl = item.imageUrl ? item.imageUrl.replace(/'/g, "\\'") : '';

                    // Main card click event listener triggers the detailed structural lightbox view
                    card.onclick = function() {
                        openAdvancedCardLightbox(item.name, cleanDesc, cleanImgUrl, targetTabWindowId, finalUrl, group);
                    };

                    card.innerHTML = `
                        <div class="card-name">${item.name}</div>
                        <div class="card-description">${cleanDesc}</div>
                        <a href="${finalUrl}" 
                           target="${targetTabWindowId}" 
                           class="card-link" 
                           onclick="event.stopPropagation(); executeSmartTabFocus(event, '${targetTabWindowId}', '${cleanFinalUrl}', '${cleanItemName}', '${cleanGroupName}')">
                            Open Link
                        </a>
                    `;
                    grid.appendChild(card);
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function closeLightbox() { document.getElementById('lightbox-overlay').style.display = 'none'; }

        // Initialize Application
        document.addEventListener('DOMContentLoaded', () => {
            loadCards();
            updateWeatherAndTime();
            
            setInterval(() => {
                loadCards();
                updateWeatherAndTime();
                console.log("Background Data Update Completed.");
            }, 300000);

            setInterval(() => {
                updateWeatherAndTime();
                applyTimeBasedTheme();
            }, 60000);
            
            window.addEventListener('resize', () => {
                clearTimeout(window.resizeTimer);
                window.resizeTimer = setTimeout(loadCards, 250);
            });
        });
    </script>
</body>
</html>
